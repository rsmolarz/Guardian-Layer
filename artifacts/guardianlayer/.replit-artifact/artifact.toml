kind = "web"
previewPath = "/"
title = "GuardianLayer Enterprise"
version = "1.0.0"
id = "artifacts/guardianlayer"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 19337
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/guardianlayer run dev"

[services.env]
PORT = "19337"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/guardianlayer", "run", "build"]
publicDir = "artifacts/guardianlayer/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
