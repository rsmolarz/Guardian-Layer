openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: GuardianLayer Enterprise API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: transactions
    description: Transaction security operations
  - name: approvals
    description: Approval workflow operations
  - name: dashboard
    description: Dashboard analytics operations
  - name: integrations
    description: Integration status operations
  - name: alerts
    description: Security alert operations
  - name: monitoring
    description: System monitoring operations
  - name: dark-web
    description: Dark web monitoring and recovery operations
  - name: recovery
    description: Asset & data recovery operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /transactions:
    get:
      operationId: listTransactions
      tags: [transactions]
      summary: List all transactions
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [ALLOWED, HELD, BLOCKED, APPROVED, REJECTED]
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
      responses:
        "200":
          description: Transaction list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TransactionList"

  /transactions/scan:
    post:
      operationId: scanTransaction
      tags: [transactions]
      summary: Scan a transaction for risk
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TransactionScanRequest"
      responses:
        "200":
          description: Scan result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TransactionScanResult"

  /transactions/{id}:
    get:
      operationId: getTransaction
      tags: [transactions]
      summary: Get transaction details
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Transaction details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Transaction"

  /approvals/{id}/approve:
    post:
      operationId: approveTransaction
      tags: [approvals]
      summary: Approve a held transaction
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Approval result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApprovalResult"

  /approvals/{id}/reject:
    post:
      operationId: rejectTransaction
      tags: [approvals]
      summary: Reject a held transaction
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Rejection result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApprovalResult"

  /dashboard/stats:
    get:
      operationId: getDashboardStats
      tags: [dashboard]
      summary: Get dashboard statistics
      responses:
        "200":
          description: Dashboard stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardStats"

  /dashboard/risk-timeline:
    get:
      operationId: getRiskTimeline
      tags: [dashboard]
      summary: Get risk score timeline data
      parameters:
        - name: days
          in: query
          schema:
            type: integer
            default: 7
      responses:
        "200":
          description: Risk timeline data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RiskTimeline"

  /alerts:
    get:
      operationId: listAlerts
      tags: [alerts]
      summary: List security alerts
      parameters:
        - name: severity
          in: query
          schema:
            type: string
            enum: [low, medium, high, critical]
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: Alert list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AlertList"

  /alerts/{id}/dismiss:
    post:
      operationId: dismissAlert
      tags: [alerts]
      summary: Dismiss an alert
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Alert dismissed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Alert"

  /integrations:
    get:
      operationId: listIntegrations
      tags: [integrations]
      summary: List all integrations and their status
      responses:
        "200":
          description: Integration list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IntegrationList"

  /email-security/threats:
    get:
      operationId: listEmailThreats
      tags: [email-security]
      summary: List detected email threats
      parameters:
        - name: threatType
          in: query
          schema:
            type: string
            enum: [phishing, malware, spoofing, bec, spam]
        - name: status
          in: query
          schema:
            type: string
            enum: [detected, quarantined, released, blocked]
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
      responses:
        "200":
          description: Email threats list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EmailThreatList"

  /email-security/threats/{id}/quarantine:
    post:
      operationId: quarantineEmail
      tags: [email-security]
      summary: Quarantine a detected email threat
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Quarantine result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EmailActionResult"

  /email-security/threats/{id}/release:
    post:
      operationId: releaseEmail
      tags: [email-security]
      summary: Release a quarantined email
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Release result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EmailActionResult"

  /email-security/stats:
    get:
      operationId: getEmailSecurityStats
      tags: [email-security]
      summary: Get email security overview stats
      responses:
        "200":
          description: Email security stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EmailSecurityStats"

  /endpoints:
    get:
      operationId: listEndpoints
      tags: [endpoints]
      summary: List all monitored endpoints
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [online, offline, degraded]
        - name: complianceStatus
          in: query
          schema:
            type: string
            enum: [compliant, non_compliant, at_risk]
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
      responses:
        "200":
          description: Endpoints list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EndpointList"

  /endpoints/stats:
    get:
      operationId: getEndpointStats
      tags: [endpoints]
      summary: Get endpoint security overview stats
      responses:
        "200":
          description: Endpoint stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EndpointStats"

  /network/events:
    get:
      operationId: listNetworkEvents
      tags: [network]
      summary: List network security events
      parameters:
        - name: eventType
          in: query
          schema:
            type: string
            enum: [firewall, ids, anomaly, portscan, ddos]
        - name: severity
          in: query
          schema:
            type: string
            enum: [critical, high, medium, low]
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
      responses:
        "200":
          description: Network events list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NetworkEventList"

  /network/stats:
    get:
      operationId: getNetworkStats
      tags: [network]
      summary: Get network security overview stats
      responses:
        "200":
          description: Network stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NetworkStats"

  /yubikey/devices:
    get:
      operationId: listYubikeyDevices
      tags: [yubikey]
      summary: List YubiKey devices
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [active, suspended, revoked, unassigned]
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
      responses:
        "200":
          description: YubiKey devices list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/YubikeyDeviceList"

  /yubikey/events:
    get:
      operationId: listYubikeyEvents
      tags: [yubikey]
      summary: List YubiKey auth events
      parameters:
        - name: eventType
          in: query
          schema:
            type: string
            enum: [auth_success, auth_failure, key_enrolled, key_revoked]
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
      responses:
        "200":
          description: YubiKey auth events
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/YubikeyEventList"

  /yubikey/stats:
    get:
      operationId: getYubikeyStats
      tags: [yubikey]
      summary: Get YubiKey overview stats
      responses:
        "200":
          description: YubiKey stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/YubikeyStats"

  /openclaw/contracts:
    get:
      operationId: listOpenclawContracts
      tags: [openclaw]
      summary: List monitored contracts
      parameters:
        - name: riskLevel
          in: query
          schema:
            type: string
            enum: [low, medium, high, critical]
        - name: status
          in: query
          schema:
            type: string
            enum: [active, expired, expiring_soon, draft]
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
      responses:
        "200":
          description: Contracts list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OpenclawContractList"

  /openclaw/stats:
    get:
      operationId: getOpenclawStats
      tags: [openclaw]
      summary: Get contract monitoring overview stats
      responses:
        "200":
          description: OpenClaw stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OpenclawStats"

  /integrations/{id}/configure:
    post:
      operationId: configureIntegration
      tags: [integrations]
      summary: Configure credentials for a pending integration
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ConfigureIntegrationRequest"
      responses:
        "200":
          description: Configuration result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConfigureIntegrationResult"

  /integrations/stripe/sync:
    post:
      operationId: syncStripeTransactions
      tags: [integrations]
      summary: Sync transactions from Stripe into GuardianLayer for risk analysis
      responses:
        "200":
          description: Sync results
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StripeSyncResult"

  /integrations/stripe/status:
    get:
      operationId: getStripeStatus
      tags: [integrations]
      summary: Check Stripe connection status
      responses:
        "200":
          description: Stripe connection status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StripeConnectionStatus"

  /integrations/google-workspace/status:
    get:
      operationId: getGoogleWorkspaceStatus
      tags: [integrations]
      summary: Get live status of connected Google Workspace services
      responses:
        "200":
          description: Google Workspace service statuses
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GoogleWorkspaceStatus"

  /monitoring/system-health:
    get:
      operationId: getSystemHealth
      tags: [monitoring]
      summary: Get real-time system health status
      responses:
        "200":
          description: System health
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SystemHealth"

  /monitoring/activity-log:
    get:
      operationId: getActivityLog
      tags: [monitoring]
      summary: Get system activity log
      parameters:
        - name: category
          in: query
          schema:
            type: string
            enum: [transaction, approval, alert, integration, system, auth]
        - name: severity
          in: query
          schema:
            type: string
            enum: [info, warning, error, critical]
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
      responses:
        "200":
          description: Activity log entries
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ActivityLogList"

  /monitoring/threat-map:
    get:
      operationId: getThreatMap
      tags: [monitoring]
      summary: Get geographic threat distribution
      responses:
        "200":
          description: Threat map data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ThreatMapData"

  /monitoring/throughput:
    get:
      operationId: getThroughput
      tags: [monitoring]
      summary: Get transaction throughput metrics
      parameters:
        - name: hours
          in: query
          schema:
            type: integer
            default: 24
      responses:
        "200":
          description: Throughput metrics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ThroughputData"

  /monitoring/risk-distribution:
    get:
      operationId: getRiskDistribution
      tags: [monitoring]
      summary: Get risk score distribution
      responses:
        "200":
          description: Risk distribution
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RiskDistribution"

  /monitoring/top-threats:
    get:
      operationId: getTopThreats
      tags: [monitoring]
      summary: Get top threat categories and sources
      responses:
        "200":
          description: Top threats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TopThreats"

  /dark-web/exposures:
    get:
      operationId: listDarkWebExposures
      tags: [dark-web]
      summary: List dark web exposure records
      parameters:
        - name: severity
          in: query
          schema:
            type: string
            enum: [low, medium, high, critical]
        - name: status
          in: query
          schema:
            type: string
            enum: [active, monitoring, resolved]
      responses:
        "200":
          description: Exposure list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DarkWebExposureList"

  /dark-web/exposures/{id}:
    get:
      operationId: getDarkWebExposure
      tags: [dark-web]
      summary: Get dark web exposure detail
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Exposure detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DarkWebExposure"

  /dark-web/recovery-actions:
    get:
      operationId: listRecoveryActions
      tags: [dark-web]
      summary: List recovery actions
      parameters:
        - name: exposureId
          in: query
          schema:
            type: integer
        - name: category
          in: query
          schema:
            type: string
            enum: [credit_protection, account_security, legal_reporting]
      responses:
        "200":
          description: Recovery action list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RecoveryActionList"

  /dark-web/recovery-actions/{id}/toggle:
    post:
      operationId: toggleRecoveryAction
      tags: [dark-web]
      summary: Mark recovery action complete or incomplete
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Updated recovery action
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RecoveryAction"

  /dark-web/summary:
    get:
      operationId: getDarkWebSummary
      tags: [dark-web]
      summary: Get dark web monitoring summary stats
      responses:
        "200":
          description: Summary stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DarkWebSummary"

  /recovery/cases:
    get:
      operationId: listRecoveryCases
      tags: [recovery]
      summary: List all recovery cases
      responses:
        "200":
          description: Recovery case list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RecoveryCaseList"

  /recovery/summary:
    get:
      operationId: getRecoverySummary
      tags: [recovery]
      summary: Get recovery summary statistics
      responses:
        "200":
          description: Recovery summary stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RecoverySummary"

  /recovery/cases/{id}:
    get:
      operationId: getRecoveryCase
      tags: [recovery]
      summary: Get recovery case detail with steps
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Recovery case detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RecoveryCaseDetail"

  /recovery/cases/{id}/status:
    patch:
      operationId: updateRecoveryCaseStatus
      tags: [recovery]
      summary: Update recovery case status
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                status:
                  type: string
                  enum: [pending, in_progress, verified, recovered]
              required:
                - status
      responses:
        "200":
          description: Updated recovery case
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RecoveryCase"

  /recovery/steps/{id}/status:
    patch:
      operationId: updateRecoveryStepStatus
      tags: [recovery]
      summary: Update recovery step status and notes
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                status:
                  type: string
                  enum: [not_started, in_progress, completed, verified]
                notes:
                  type: string
              required:
                - status
      responses:
        "200":
          description: Updated recovery step
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RecoveryStep"

  /recovery/cases/{id}/verify:
    post:
      operationId: verifyRecoveryCase
      tags: [recovery]
      summary: Mark a recovery case as fully verified and recovered
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Verified recovery case
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RecoveryCase"

  /recovery/timeline:
    get:
      operationId: getRecoveryTimeline
      tags: [recovery]
      summary: Get chronological recovery timeline across all cases
      responses:
        "200":
          description: Recovery timeline
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RecoveryTimeline"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    Transaction:
      type: object
      properties:
        id:
          type: integer
        source:
          type: string
        destination:
          type: string
        amount:
          type: number
        currency:
          type: string
        riskScore:
          type: number
        status:
          type: string
          enum: [ALLOWED, HELD, BLOCKED, APPROVED, REJECTED]
        category:
          type: string
        ipAddress:
          type: string
          nullable: true
        country:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - source
        - destination
        - amount
        - currency
        - riskScore
        - status
        - category
        - createdAt

    TransactionList:
      type: object
      properties:
        transactions:
          type: array
          items:
            $ref: "#/components/schemas/Transaction"
        total:
          type: integer
      required:
        - transactions
        - total

    TransactionScanRequest:
      type: object
      properties:
        source:
          type: string
        destination:
          type: string
        amount:
          type: number
        currency:
          type: string
        category:
          type: string
        ipAddress:
          type: string
        country:
          type: string
      required:
        - source
        - destination
        - amount
        - currency

    TransactionScanResult:
      type: object
      properties:
        transaction:
          $ref: "#/components/schemas/Transaction"
        riskFactors:
          type: array
          items:
            type: string
      required:
        - transaction
        - riskFactors

    ApprovalResult:
      type: object
      properties:
        id:
          type: integer
        status:
          type: string
          enum: [APPROVED, REJECTED]
        approvedAt:
          type: string
          format: date-time
      required:
        - id
        - status
        - approvedAt

    DashboardStats:
      type: object
      properties:
        totalTransactions:
          type: integer
        totalBlocked:
          type: integer
        totalHeld:
          type: integer
        totalAllowed:
          type: integer
        averageRiskScore:
          type: number
        blockRate:
          type: number
        activeAlerts:
          type: integer
        integrationsOnline:
          type: integer
      required:
        - totalTransactions
        - totalBlocked
        - totalHeld
        - totalAllowed
        - averageRiskScore
        - blockRate
        - activeAlerts
        - integrationsOnline

    RiskTimeline:
      type: object
      properties:
        dataPoints:
          type: array
          items:
            type: object
            properties:
              date:
                type: string
              avgRisk:
                type: number
              transactionCount:
                type: integer
              blockedCount:
                type: integer
            required:
              - date
              - avgRisk
              - transactionCount
              - blockedCount
      required:
        - dataPoints

    Alert:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        message:
          type: string
        severity:
          type: string
          enum: [low, medium, high, critical]
        dismissed:
          type: boolean
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - title
        - message
        - severity
        - dismissed
        - createdAt

    AlertList:
      type: object
      properties:
        alerts:
          type: array
          items:
            $ref: "#/components/schemas/Alert"
        total:
          type: integer
      required:
        - alerts
        - total

    Integration:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        provider:
          type: string
        status:
          type: string
          enum: [online, offline, degraded, pending]
        category:
          type: string
          enum: [payments, banking, security, notifications, sms, identity_protection, privacy]
        description:
          type: string
        lastChecked:
          type: string
          format: date-time
      required:
        - id
        - name
        - provider
        - status
        - category
