openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: GuardianLayer Enterprise API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: transactions
    description: Transaction security operations
  - name: approvals
    description: Approval workflow operations
  - name: dashboard
    description: Dashboard analytics operations
  - name: integrations
    description: Integration status operations
  - name: alerts
    description: Security alert operations
  - name: monitoring
    description: System monitoring operations
  - name: dark-web
    description: Dark web monitoring and recovery operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /transactions:
    get:
      operationId: listTransactions
      tags: [transactions]
      summary: List all transactions
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [ALLOWED, HELD, BLOCKED, APPROVED, REJECTED]
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
      responses:
        "200":
          description: Transaction list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TransactionList"

  /transactions/scan:
    post:
      operationId: scanTransaction
      tags: [transactions]
      summary: Scan a transaction for risk
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TransactionScanRequest"
      responses:
        "200":
          description: Scan result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TransactionScanResult"

  /transactions/{id}:
    get:
      operationId: getTransaction
      tags: [transactions]
      summary: Get transaction details
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Transaction details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Transaction"

  /approvals/{id}/approve:
    post:
      operationId: approveTransaction
      tags: [approvals]
      summary: Approve a held transaction
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Approval result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApprovalResult"

  /approvals/{id}/reject:
    post:
      operationId: rejectTransaction
      tags: [approvals]
      summary: Reject a held transaction
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Rejection result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApprovalResult"

  /dashboard/stats:
    get:
      operationId: getDashboardStats
      tags: [dashboard]
      summary: Get dashboard statistics
      responses:
        "200":
          description: Dashboard stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardStats"

  /dashboard/risk-timeline:
    get:
      operationId: getRiskTimeline
      tags: [dashboard]
      summary: Get risk score timeline data
      parameters:
        - name: days
          in: query
          schema:
            type: integer
            default: 7
      responses:
        "200":
          description: Risk timeline data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RiskTimeline"

  /alerts:
    get:
      operationId: listAlerts
      tags: [alerts]
      summary: List security alerts
      parameters:
        - name: severity
          in: query
          schema:
            type: string
            enum: [low, medium, high, critical]
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: Alert list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AlertList"

  /alerts/{id}/dismiss:
    post:
      operationId: dismissAlert
      tags: [alerts]
      summary: Dismiss an alert
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Alert dismissed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Alert"

  /integrations:
    get:
      operationId: listIntegrations
      tags: [integrations]
      summary: List all integrations and their status
      responses:
        "200":
          description: Integration list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IntegrationList"

  /integrations/{id}/configure:
    post:
      operationId: configureIntegration
      tags: [integrations]
      summary: Configure credentials for a pending integration
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ConfigureIntegrationRequest"
      responses:
        "200":
          description: Configuration result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConfigureIntegrationResult"

  /integrations/stripe/sync:
    post:
      operationId: syncStripeTransactions
      tags: [integrations]
      summary: Sync transactions from Stripe into GuardianLayer for risk analysis
      responses:
        "200":
          description: Sync results
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StripeSyncResult"

  /integrations/stripe/status:
    get:
      operationId: getStripeStatus
      tags: [integrations]
      summary: Check Stripe connection status
      responses:
        "200":
          description: Stripe connection status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StripeConnectionStatus"

  /integrations/google-workspace/status:
    get:
      operationId: getGoogleWorkspaceStatus
      tags: [integrations]
      summary: Get live status of connected Google Workspace services
      responses:
        "200":
          description: Google Workspace service statuses
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GoogleWorkspaceStatus"

  /monitoring/system-health:
    get:
      operationId: getSystemHealth
      tags: [monitoring]
      summary: Get real-time system health status
      responses:
        "200":
          description: System health
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SystemHealth"

  /monitoring/activity-log:
    get:
      operationId: getActivityLog
      tags: [monitoring]
      summary: Get system activity log
      parameters:
        - name: category
          in: query
          schema:
            type: string
            enum: [transaction, approval, alert, integration, system, auth]
        - name: severity
          in: query
          schema:
            type: string
            enum: [info, warning, error, critical]
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
      responses:
        "200":
          description: Activity log entries
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ActivityLogList"

  /monitoring/threat-map:
    get:
      operationId: getThreatMap
      tags: [monitoring]
      summary: Get geographic threat distribution
      responses:
        "200":
          description: Threat map data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ThreatMapData"

  /monitoring/throughput:
    get:
      operationId: getThroughput
      tags: [monitoring]
      summary: Get transaction throughput metrics
      parameters:
        - name: hours
          in: query
          schema:
            type: integer
            default: 24
      responses:
        "200":
          description: Throughput metrics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ThroughputData"

  /monitoring/risk-distribution:
    get:
      operationId: getRiskDistribution
      tags: [monitoring]
      summary: Get risk score distribution
      responses:
        "200":
          description: Risk distribution
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RiskDistribution"

  /monitoring/top-threats:
    get:
      operationId: getTopThreats
      tags: [monitoring]
      summary: Get top threat categories and sources
      responses:
        "200":
          description: Top threats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TopThreats"

  /dark-web/exposures:
    get:
      operationId: listDarkWebExposures
      tags: [dark-web]
      summary: List dark web exposure records
      parameters:
        - name: severity
          in: query
          schema:
            type: string
            enum: [low, medium, high, critical]
        - name: status
          in: query
          schema:
            type: string
            enum: [active, monitoring, resolved]
      responses:
        "200":
          description: Exposure list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DarkWebExposureList"

  /dark-web/exposures/{id}:
    get:
      operationId: getDarkWebExposure
      tags: [dark-web]
      summary: Get dark web exposure detail
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Exposure detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DarkWebExposure"

  /dark-web/recovery-actions:
    get:
      operationId: listRecoveryActions
      tags: [dark-web]
      summary: List recovery actions
      parameters:
        - name: exposureId
          in: query
          schema:
            type: integer
        - name: category
          in: query
          schema:
            type: string
            enum: [credit_protection, account_security, legal_reporting]
      responses:
        "200":
          description: Recovery action list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RecoveryActionList"

  /dark-web/recovery-actions/{id}/toggle:
    post:
      operationId: toggleRecoveryAction
      tags: [dark-web]
      summary: Mark recovery action complete or incomplete
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Updated recovery action
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RecoveryAction"

  /dark-web/summary:
    get:
      operationId: getDarkWebSummary
      tags: [dark-web]
      summary: Get dark web monitoring summary stats
      responses:
        "200":
          description: Summary stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DarkWebSummary"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    Transaction:
      type: object
      properties:
        id:
          type: integer
        source:
          type: string
        destination:
          type: string
        amount:
          type: number
        currency:
          type: string
        riskScore:
          type: number
        status:
          type: string
          enum: [ALLOWED, HELD, BLOCKED, APPROVED, REJECTED]
        category:
          type: string
        ipAddress:
          type: string
          nullable: true
        country:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - source
        - destination
        - amount
        - currency
        - riskScore
        - status
        - category
        - createdAt

    TransactionList:
      type: object
      properties:
        transactions:
          type: array
          items:
            $ref: "#/components/schemas/Transaction"
        total:
          type: integer
      required:
        - transactions
        - total

    TransactionScanRequest:
      type: object
      properties:
        source:
          type: string
        destination:
          type: string
        amount:
          type: number
        currency:
          type: string
        category:
          type: string
        ipAddress:
          type: string
        country:
          type: string
      required:
        - source
        - destination
        - amount
        - currency

    TransactionScanResult:
      type: object
      properties:
        transaction:
          $ref: "#/components/schemas/Transaction"
        riskFactors:
          type: array
          items:
            type: string
      required:
        - transaction
        - riskFactors

    ApprovalResult:
      type: object
      properties:
        id:
          type: integer
        status:
          type: string
          enum: [APPROVED, REJECTED]
        approvedAt:
          type: string
          format: date-time
      required:
        - id
        - status
        - approvedAt

    DashboardStats:
      type: object
      properties:
        totalTransactions:
          type: integer
        totalBlocked:
          type: integer
        totalHeld:
          type: integer
        totalAllowed:
          type: integer
        averageRiskScore:
          type: number
        blockRate:
          type: number
        activeAlerts:
          type: integer
        integrationsOnline:
          type: integer
      required:
        - totalTransactions
        - totalBlocked
        - totalHeld
        - totalAllowed
        - averageRiskScore
        - blockRate
        - activeAlerts
        - integrationsOnline

    RiskTimeline:
      type: object
      properties:
        dataPoints:
          type: array
          items:
            type: object
            properties:
              date:
                type: string
              avgRisk:
                type: number
              transactionCount:
                type: integer
              blockedCount:
                type: integer
            required:
              - date
              - avgRisk
              - transactionCount
              - blockedCount
      required:
        - dataPoints

    Alert:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        message:
          type: string
        severity:
          type: string
          enum: [low, medium, high, critical]
        dismissed:
          type: boolean
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - title
        - message
        - severity
        - dismissed
        - createdAt

    AlertList:
      type: object
      properties:
        alerts:
          type: array
          items:
            $ref: "#/components/schemas/Alert"
        total:
          type: integer
      required:
        - alerts
        - total

    Integration:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        provider:
          type: string
        status:
          type: string
          enum: [online, offline, degraded, pending]
        category:
          type: string
          enum: [payments, banking, security, notifications, sms, identity_protection, privacy]
        description:
          type: string
        lastChecked:
          type: string
          format: date-time
      required:
        - id
        - name
        - provider
        - status
        - category
        - description
        - lastChecked

    IntegrationList:
      type: object
      properties:
        integrations:
          type: array
          items:
            $ref: "#/components/schemas/Integration"
      required:
        - integrations

    GoogleWorkspaceServiceStatus:
      type: object
      properties:
        service:
          type: string
        connected:
          type: boolean
        error:
          type: string
          nullable: true
        lastChecked:
          type: string
          format: date-time
        permissions:
          type: array
          items:
            type: string
      required:
        - service
        - connected
        - lastChecked
        - permissions

    GoogleWorkspaceStatus:
      type: object
      properties:
        services:
          type: array
          items:
            $ref: "#/components/schemas/GoogleWorkspaceServiceStatus"
        connectedCount:
          type: integer
        totalCount:
          type: integer
      required:
        - services
        - connectedCount
        - totalCount

    ConfigureIntegrationRequest:
      type: object
      properties:
        apiKey:
          type: string
        webhookUrl:
          type: string
          nullable: true
        environment:
          type: string
          nullable: true
      required:
        - apiKey

    ConfigureIntegrationResult:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        status:
          type: string
          enum: [online, offline, degraded, pending]
        message:
          type: string
      required:
        - id
        - name
        - status
        - message

    StripeSyncResult:
      type: object
      properties:
        synced:
          type: integer
        skipped:
          type: integer
        errors:
          type: array
          items:
            type: string
        message:
          type: string
      required:
        - synced
        - skipped
        - errors
        - message

    StripeConnectionStatus:
      type: object
      properties:
        connected:
          type: boolean
        mode:
          type: string
          enum: [test, live]
        accountName:
          type: string
          nullable: true
        error:
          type: string
          nullable: true
      required:
        - connected
        - mode

    SystemHealth:
      type: object
      properties:
        overall:
          type: string
          enum: [healthy, degraded, critical]
        uptime:
          type: integer
        services:
          type: array
          items:
            type: object
            properties:
              name:
                type: string
              status:
                type: string
                enum: [healthy, degraded, down]
              latencyMs:
                type: number
              lastCheck:
                type: string
                format: date-time
              details:
                type: string
            required:
              - name
              - status
              - latencyMs
              - lastCheck
        metrics:
          type: object
          properties:
            requestsPerMinute:
              type: number
            avgResponseMs:
              type: number
            errorRate:
              type: number
            activeConnections:
              type: integer
            memoryUsageMb:
              type: number
            cpuPercent:
              type: number
          required:
            - requestsPerMinute
            - avgResponseMs
            - errorRate
            - activeConnections
            - memoryUsageMb
            - cpuPercent
      required:
        - overall
        - uptime
        - services
        - metrics

    ActivityLogEntry:
      type: object
      properties:
        id:
          type: integer
        action:
          type: string
        category:
          type: string
        source:
          type: string
        detail:
          type: string
        severity:
          type: string
          enum: [info, warning, error, critical]
        ipAddress:
          type: string
        responseTimeMs:
          type: number
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - action
        - category
        - source
        - detail
        - severity
        - createdAt

    ActivityLogList:
      type: object
      properties:
        entries:
          type: array
          items:
            $ref: "#/components/schemas/ActivityLogEntry"
        total:
          type: integer
      required:
        - entries
        - total

    ThreatMapData:
      type: object
      properties:
        regions:
          type: array
          items:
            type: object
            properties:
              country:
                type: string
              countryName:
                type: string
              totalTransactions:
                type: integer
              blockedTransactions:
                type: integer
              heldTransactions:
                type: integer
              avgRiskScore:
                type: number
              threatLevel:
                type: string
                enum: [low, medium, high, critical]
            required:
              - country
              - countryName
              - totalTransactions
              - blockedTransactions
              - heldTransactions
              - avgRiskScore
              - threatLevel
      required:
        - regions

    ThroughputData:
      type: object
      properties:
        dataPoints:
          type: array
          items:
            type: object
            properties:
              timestamp:
                type: string
              transactionsProcessed:
                type: integer
              blockedCount:
                type: integer
              avgResponseMs:
                type: number
            required:
              - timestamp
              - transactionsProcessed
              - blockedCount
              - avgResponseMs
        summary:
          type: object
          properties:
            totalProcessed:
              type: integer
            peakPerHour:
              type: integer
            avgPerHour:
              type: number
          required:
            - totalProcessed
            - peakPerHour
            - avgPerHour
      required:
        - dataPoints
        - summary

    RiskDistribution:
      type: object
      properties:
        buckets:
          type: array
          items:
            type: object
            properties:
              range:
                type: string
              count:
                type: integer
              percentage:
                type: number
            required:
              - range
              - count
              - percentage
        totalAnalyzed:
          type: integer
      required:
        - buckets
        - totalAnalyzed

    TopThreats:
      type: object
      properties:
        byCategory:
          type: array
          items:
            type: object
            properties:
              category:
                type: string
              count:
                type: integer
              avgRisk:
                type: number
              blockedCount:
                type: integer
            required:
              - category
              - count
              - avgRisk
              - blockedCount
        bySource:
          type: array
          items:
            type: object
            properties:
              source:
                type: string
              count:
                type: integer
              avgRisk:
                type: number
              lastSeen:
                type: string
                format: date-time
            required:
              - source
              - count
              - avgRisk
              - lastSeen
        recentHighRisk:
          type: array
          items:
            $ref: "#/components/schemas/Transaction"
      required:
        - byCategory
        - bySource
        - recentHighRisk

    DarkWebExposure:
      type: object
      properties:
        id:
          type: integer
        dataType:
          type: string
        sourceMarketplace:
          type: string
        severity:
          type: string
          enum: [low, medium, high, critical]
        status:
          type: string
          enum: [active, monitoring, resolved]
        discoveryDate:
          type: string
          format: date-time
        description:
          type: string
        recommendedActions:
          type: string
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - dataType
        - sourceMarketplace
        - severity
        - status
        - discoveryDate
        - description
        - recommendedActions
        - createdAt

    DarkWebExposureList:
      type: object
      properties:
        exposures:
          type: array
          items:
            $ref: "#/components/schemas/DarkWebExposure"
        total:
          type: integer
      required:
        - exposures
        - total

    RecoveryAction:
      type: object
      properties:
        id:
          type: integer
        exposureId:
          type: integer
        title:
          type: string
        description:
          type: string
        category:
          type: string
          enum: [credit_protection, account_security, legal_reporting]
        completed:
          type: boolean
        priority:
          type: integer
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - exposureId
        - title
        - description
        - category
        - completed
        - priority
        - createdAt

    RecoveryActionList:
      type: object
      properties:
        actions:
          type: array
          items:
            $ref: "#/components/schemas/RecoveryAction"
        total:
          type: integer
        completedCount:
          type: integer
      required:
        - actions
        - total
        - completedCount

    DarkWebSummary:
      type: object
      properties:
        totalExposures:
          type: integer
        activeExposures:
          type: integer
        criticalExposures:
          type: integer
        recoveryProgress:
          type: number
        exposuresByType:
          type: array
          items:
            type: object
            properties:
              dataType:
                type: string
              count:
                type: integer
            required:
              - dataType
              - count
      required:
        - totalExposures
        - activeExposures
        - criticalExposures
        - recoveryProgress
        - exposuresByType
